<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Wall Art Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Digital Wall Art Store</h1>
    <p class="slogan">Discover art you love; we’ll print and ship it to your door.</p>
</header>

<section>
    <h2>Available Art</h2>
    <div id="product-grid"></div>
</section>

<section class="cart-section">
    <h2>Shopping Cart</h2>
    <table id="cart-table">
        <thead>
            <tr>
                <th>Art</th>
                <th>Size</th> <th>Price</th>
                <th>Quantity</th>
                <th>Total</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
    <h3 id="cart-total">Total: Rs 0</h3>
</section>

<script src="script.js"></script>
</body>
</html>
